name: Music Player CI/CS Pipeline

# Workflow berjalan saat ada Push atau Pull Request ke branch utama
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # JOB 1: Continuous Integration (CI) - Unit Testing
  unit-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm test

  # JOB 2: Continuous Security (CS) - Security Scan
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run NPM Audit (Vulnerability Scan)
        run: npm audit --audit-level=high

      # Opsional: Menggunakan Tool Security Scan Tambahan (Snyk)
      - name: Node Security Scan
        uses: nodejs/security-wg-vuln-checker@v1

  # JOB 3: Docker Build Check
  docker-build:
    runs-on: ubuntu-latest
    needs: [unit-testing, security-scan] # Hanya jalan jika Test & Scan sukses
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Validation)
        run: |
          docker build -t music-player-app:latest .